<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Paste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">Fix Paste</h1>
      <p class="app-subtitle">Content Extraction Engine</p>
    </header>

    <main class="app-content">
      <button id="btn-copy" class="btn-primary">Copy to Clipboard</button>

      <div class="action-grid">
        <button id="btn-download" class="btn-secondary">Download Text File</button>
        <button id="btn-pdf" class="btn-secondary">Save as PDF</button>
      </div>

      <div class="status-summary">
        <span id="status-text">Ready to extract page content.</span>
      </div>
    </main>

    <footer class="app-footer">
      <span class="version-text">v1.1.0</span>
    </footer>
  </div>
  <script src="html2pdf.bundle.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
