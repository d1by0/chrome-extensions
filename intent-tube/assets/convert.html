<!DOCTYPE html>
<html>
<head>
  <title>Converting...</title>
</head>
<body>
  <img id="src" src="IntentTube_logo.avif" style="max-width: 200px;">
  <div>
    <textarea id="out16" style="width: 100%; height: 80px;"></textarea>
    <textarea id="out48" style="width: 100%; height: 80px;"></textarea>
    <textarea id="out128" style="width: 100%; height: 80px;"></textarea>
  </div>
  <script>
    const img = document.getElementById('src');
    img.onload = () => {
      [16, 48, 128].forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const dataUrl = canvas.toDataURL('image/png');
        const base64 = dataUrl.split(',')[1];
        document.getElementById('out' + size).value = base64;
      });
      document.title = "DONE";
    };
    // Trigger if already loaded
    if (img.complete) {
      img.onload();
    }
  </script>
</body>
</html>
